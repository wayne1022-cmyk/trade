name: USDJPY Trading Bot

on:
  schedule:
    - cron: '0 0-9 * * *'   # UTC 0-9 點 (台灣 8-17 點)
    - cron: '0 10 * * *'    # UTC 10 點 (台灣 18 點) 結算
  workflow_dispatch:

jobs:
  run-trade-bot:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0-9 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        run: python main.py
        env:
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_IDENTIFIER: ${{ secrets.IG_IDENTIFIER }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_EPIC: ${{ secrets.IG_EPIC }}

      # 新增：提交並推送 LOG_FILE.txt 回倉庫
      - name: Commit and push log file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LOG_FILE.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update trade log [skip ci]"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main

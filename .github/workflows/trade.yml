name: Trade Bot Debug

on:
  schedule:
    # 每10分钟一次，周一至周五 UTC 0-10点（台湾8-18点）
    - cron: '*/10 0-23 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug - Show current time
        run: |
          echo "UTC time: $(date -u)"
          echo "Local time (CST): $(TZ='Asia/Taipei' date)"

      - name: Run trading bot
        run: python main.py
        env:
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_IDENTIFIER: ${{ secrets.IG_IDENTIFIER }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_EPIC: ${{ secrets.IG_EPIC }}

      - name: Commit and push log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update trade log [skip ci]"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
